apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-vsrlat
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - profile.vsr.lat
    secretName: profile-vsr-tls
  rules:
  - host: profile.vsr.lat
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: site-vsrlat
            port:
              number: 80
