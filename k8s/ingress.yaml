apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-vsrlat
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - vsr.lat
    - www.vsr.lat
    secretName: vsr-lat-tls
  rules:
  - host: vsr.lat
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: site-vsrlat
            port:
              number: 80
  - host: www.vsr.lat
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: site-vsrlat
            port:
              number: 80
